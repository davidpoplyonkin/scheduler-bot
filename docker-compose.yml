services:
  crud-api:
    hostname: crud-sb
    build:
      context: ./crud_api
    secrets:
      - google-key
    environment:
      - IANA_TZ=${IANA_TZ}
      - MIN_ADVANCE_MINUTES=${MIN_ADVANCE_MINUTES}
      - MAX_ADVANCE_DAYS=${MAX_ADVANCE_DAYS}
      - FORBIDDEN_WEEKDAYS=${FORBIDDEN_WEEKDAYS}
      - NOTIFICATION_DELETE_SECONDS=${NOTIFICATION_DELETE_SECONDS}
      - APPOINTMENT_DURATION_MINUTES=${APPOINTMENT_DURATION_MINUTES}
      - API_ALLOW_ORIGINS=${API_ALLOW_ORIGINS}
      - ADMIN_TG_ID=${ADMIN_TG_ID}
      - TG_TOKEN=${TG_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - QR_TOKEN=${QR_TOKEN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ADMIN_GOOGLE_EMAIL=${ADMIN_GOOGLE_EMAIL}
      - BOT_NAME=${BOT_NAME}
      - MONOBANK_TOKEN=${MONOBANK_TOKEN}
      - MONOBANK_API_URL=${MONOBANK_API_URL}
      - MONOBANK_REDIRECT_URL=${MONOBANK_REDIRECT_URL}
      - MONOBANK_WEBHOOK_URL=${MONOBANK_WEBHOOK_URL}
      - INVOICE_VALIDITY_SECONDS=${INVOICE_VALIDITY_SECONDS}
      - INVOICE_CHECK_DELAY_SECONDS=${INVOICE_CHECK_DELAY_SECONDS}
      - INVOICE_CHECK_MAX_RETRIES=${INVOICE_CHECK_MAX_RETRIES}
    depends_on:
      - postgres
      - redis
    networks:
      - internal
      - nginx-proxy-manager
  tg-mini-app:
    hostname: tma-sb
    build:
      context: ./tg_mini_app
      args:
        - VITE_CRUD_API_URL=${API_URL}
    depends_on:
      - crud-api
    networks:
      - internal
      - nginx-proxy-manager
  postgres:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - internal
  redis:
    image: redis:7.4-alpine
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD} 
    volumes:
      - redis_data:/data
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
  nginx-proxy-manager:
    external: true

secrets:
  google-key:
    file: ./google-key.json
